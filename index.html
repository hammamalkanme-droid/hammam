<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مساعد زيد الذكي</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #1c1c1e;
            --card-bg: #ffffff;
            --primary-color: #248bcf;
            --bubble-user: #248bcf;
            --bubble-bot: #ffffff;
            --border-color: #e5e5ea;
        }
        body.tg {
            --bg-color: var(--tg-theme-bg-color, #f0f2f5);
            --text-color: var(--tg-theme-text-color, #1c1c1e);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --primary-color: var(--tg-theme-button-color, #248bcf);
            --bubble-user: var(--tg-theme-button-color, #248bcf);
            --bubble-bot: var(--tg-theme-bg-color, #ffffff);
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            /* حل مشكلة القص نهائياً باستخدام الأبعاد الديناميكية ومتغيرات التليجرام */
            height: 100dvh;
            height: var(--tg-viewport-height, 100dvh);
            overflow: hidden;
        }
        
        /* هيدر محمي من التداخل العلوي */
        .app-header {
            background: var(--card-bg);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 1px 5px rgba(0,0,0,0.03);
            flex-shrink: 0;
        }
        .app-header h3 { margin: 0; font-size: 16px; font-weight: 700; color: var(--primary-color); }
        .app-header p { margin: 3px 0 0 0; font-size: 11px; opacity: 0.6; }

        /* منطقة الشات مرنة وتتطابق مع المساحة المتبقية */
        .chat-area {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-color);
        }
        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            word-wrap: break-word;
            white-space: pre-line;
            animation: fadeIn 0.2s ease-out;
        }
        .user-msg {
            background: var(--bubble-user);
            color: #ffffff;
            align-self: flex-start;
            border-bottom-right-radius: 4px;
        }
        .bot-msg {
            background: var(--bubble-bot);
            color: var(--text-color);
            align-self: flex-end;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(0,0,0,0.08);
        }
        
        /* بار سفلي ثابت ومحمي من الاختفاء تحت أزرار النظام */
        .input-bar {
            background: var(--card-bg);
            padding: 10px 14px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            flex-shrink: 0;
        }
        .input-bar input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 15px;
            outline: none;
        }
        .input-bar button {
            background: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        .loading-dots { font-style: italic; opacity: 0.6; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-header">
        <h3>🤖 مساعد بوت زيد الذكي</h3>
        <p>المنهج الليبي • بإشراف فريق النخبة</p>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="msg bot-msg">مرحبتين بيك يا غالي! أنا بوت زيد الذكي، كيف نقدر نساعدك اليوم في قرايتك؟ 📚✨</div>
    </div>

    <div class="input-bar">
        <input type="text" id="studentInput" placeholder="اكتب سؤالك هنا..." onkeypress="checkEnter(event)">
        <button onclick="sendToAI()">إرسال</button>
    </div>

    <script>
        const GEMINI_API_KEY = "AQ.Ab8RN6KrB_772z5c3LhX1lovCkdjjgTaLY-Lmpi_J07DbuY-Ww";

        const tg = window.Telegram.WebApp;
        if (tg) { 
            tg.ready(); 
            tg.expand(); 
            document.body.classList.add('tg'); 
        }

        const chatArea = document.getElementById('chatArea');
        const studentInput = document.getElementById('studentInput');

        function checkEnter(e) { if (e.key === 'Enter') sendToAI(); }

        async function sendToAI() {
            const query = studentInput.value.trim();
            if (!query) return;

            appendMsg(query, 'user-msg');
            studentInput.value = '';

            const loadId = appendMsg('جاري صياغة الإجابة... ⏳', 'bot-msg loading-dots');
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: query }] }],
                        systemInstruction: {
                            parts: [{ text: "أنت 'بوت زيد'، مساعد تعليمي ذكي ومخصص لمساعدة طلبة المناهج الدراسية في ليبيا. تم تطويرك وبرمجتك بواسطة المطور (همام الكانمي) تحت إشراف وإدارة (فريق النخبة). أسلوبك فصيح، سهل، ومليء بالتحفيز. إذا سألك أحد من طورك؟ أجب بفخر: طوّرني المطور همام الكانمي بدعم من فريق النخبة!" }]
                        }
                    })
                });

                const data = await res.json();
                
                // لو السيرفر رجّع خطأ واضح (زي حظر حظر آيبي أو مشكلة صلاحيات)
                if (data.error) {
                    document.getElementById(loadId).remove();
                    appendMsg(`❌ خطأ من جوجل: ${data.error.message}`, 'bot-msg');
                    return;
                }

                const replyText = data.candidates[0].content.parts[0].text;
                document.getElementById(loadId).remove();
                appendMsg(replyText, 'bot-msg');

            } catch (err) {
                document.getElementById(loadId).remove();
                appendMsg(`❌ فشل الاتصال: ${err.message}`, 'bot-msg');
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function appendMsg(text, className) {
            const id = 'id-' + Date.now();
            const div = document.createElement('div');
            div.className = `msg ${className}`;
            div.id = id;
            div.innerText = text;
            chatArea.appendChild(div);
            return id;
        }
    </script>
</body>
</html>
