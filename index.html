<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوت زيد</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #f0f2f5; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        
        .header { background: #ffffff; padding: 10px; border-bottom: 1px solid #ddd; text-align: center; font-weight: bold; }
        
        #chatArea { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 14px; }
        .bot { background: #fff; align-self: flex-start; border: 1px solid #ddd; }
        .user { background: #0088cc; color: white; align-self: flex-end; }

        .input-area { background: #fff; padding: 10px; display: flex; gap: 5px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 15px; outline: none; }
        button { background: #0088cc; color: white; border: none; padding: 8px 15px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">🤖 بوت زيد (الطموح)</div>
        <div id="chatArea">
            <div class="msg bot">أهلاً بك يا غالي! أنا زيد، كيف أساعدك اليوم؟</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب سؤالك...">
            <button onclick="sendMsg()">إرسال</button>
        </div>
    </div>

    <script>
        const API_KEY = "AQ.Ab8RN6KrB_772z5c3LhX1lovCkdjjgTaLY-Lmpi_J07DbuY-Ww";
        // المسار الصحيح والمحدث لـ Gemini
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        async function sendMsg() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chatArea');
            if(!input.value) return;

            chat.innerHTML += `<div class="msg user">${input.value}</div>`;
            const userText = input.value;
            input.value = '';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg bot">${reply}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg bot" style="color:red">خطأ: ${e.message}</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
