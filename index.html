<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الإحصاء - الشهادة الثانوية ليبيا</title>
    <!-- استدعاء خط عربي جميل -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .quiz-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            text-align: center;
        }
        h1 {
            color: #1a73e8;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .question-counter {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: right;
            font-weight: bold;
            color: #444;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #e8f0fe;
            border-color: #1a73e8;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        /* ألوان الإجابات */
        .correct {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724 !important;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24 !important;
        }
        .feedback {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            min-height: 27px;
        }
        .next-btn {
            margin-top: 20px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            display: none; /* مخفي حتى يجاوب المستخدم */
            width: 100%;
            transition: 0.3s;
        }
        .next-btn:hover {
            background-color: #155dbb;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <h1>مراجعة الإحصاء - القسم العلمي</h1>
        <div class="question-counter" id="question-counter">سؤال عشوائي من بنك الأسئلة</div>
        
        <div class="question-text" id="question-text">
            جاري تحميل السؤال...
        </div>
        
        <div class="options-container" id="options-container">
            <!-- الأزرار ستظهر هنا برمجياً -->
        </div>

        <div class="feedback" id="feedback"></div>
        
        <button class="next-btn" id="next-btn" onclick="loadNextQuestion()">سؤال تالي 🔄</button>
    </div>

    <script>
        // ==========================================
        // منطقة بنك الأسئلة (يمكنك إضافة الـ 500 سؤال هنا)
        // ==========================================
        const questionsBank = [
            {
                question: "إذا كان A و B حدثين متنافيين، فإن P(A ∪ B) يساوي:",
                options: ["P(A) × P(B)", "P(A) + P(B)", "P(A) - P(B)", "صفر"],
                correctIndex: 1 // الإجابة الصحيحة هي الخيار الثاني (العد يبدأ من 0)
            },
            {
                question: "المساحة الكلية تحت منحنى التوزيع الطبيعي تساوي:",
                options: ["0.5", "صفر", "1", "تعتمد على قيمة المتوسط"],
                correctIndex: 2
            },
            {
                question: "في توزيع ذات الحدين، إذا كان احتمال النجاح P، فإن احتمال الفشل q يساوي:",
                options: ["1 - P", "P - 1", "P / 1", "1 + P"],
                correctIndex: 0
            },
            {
                question: "تستخدم توزيعة بواسون غالباً لنمذجة:",
                options: ["الأحداث النادرة (الصغيرة جداً)", "الأحداث المؤكدة", "المتغيرات العشوائية المتصلة", "جميع ما سبق"],
                correctIndex: 0
            },
            {
                question: "الفرضية التي ندعي صحتها ونرغب في اختبارها وتأخذ علامة التساوي عادة تسمى:",
                options: ["الفرضية البديلة", "الفرضية العدمية (الصفرية)", "مستوى المعنوية", "منطقة الرفض"],
                correctIndex: 1
            }
            // أضف باقي الأسئلة هنا بنفس النسق...
            // { question: "السؤال", options: ["خيار1", "خيار2", "خيار3", "خيار4"], correctIndex: رقم_الإجابة_الصحيحة }
        ];

        // متغير لحفظ السؤال الحالي
        let currentQuestion;

        function loadNextQuestion() {
            // 1. إعادة ضبط الواجهة
            const optionsContainer = document.getElementById('options-container');
            const feedback = document.getElementById('feedback');
            const nextBtn = document.getElementById('next-btn');
            
            optionsContainer.innerHTML = '';
            feedback.innerHTML = '';
            nextBtn.style.display = 'none';

            // 2. اختيار سؤال عشوائي من بنك الأسئلة
            const randomIndex = Math.floor(Math.random() * questionsBank.length);
            currentQuestion = questionsBank[randomIndex];

            // 3. عرض نص السؤال
            document.getElementById('question-text').innerText = currentQuestion.question;

            // 4. إنشاء أزرار الخيارات
            currentQuestion.options.forEach((optionText, index) => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                btn.innerText = optionText;
                // عند الضغط على الخيار، استدعِ دالة التحقق
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, selectedButton) {
            const optionsContainer = document.getElementById('options-container');
            const allButtons = optionsContainer.querySelectorAll('.option-btn');
            const feedback = document.getElementById('feedback');
            
            // تعطيل جميع الأزرار لمنع الإجابة مرتين
            allButtons.forEach(btn => btn.disabled = true);

            // التحقق من الإجابة
            if (selectedIndex === currentQuestion.correctIndex) {
                // إجابة صحيحة
                selectedButton.classList.add('correct');
                feedback.innerHTML = '<span style="color: #28a745;">إجابة صحيحة! أحسنت 👏</span>';
            } else {
                // إجابة خاطئة
                selectedButton.classList.add('incorrect');
                // تظليل الإجابة الصحيحة باللون الأخضر حتى يتعلم منها الطالب
                allButtons[currentQuestion.correctIndex].classList.add('correct');
                feedback.innerHTML = '<span style="color: #dc3545;">إجابة خاطئة! راجع الإجابة الصحيحة المظللة بالأخضر.</span>';
            }

            // إظهار زر "سؤال تالي"
            document.getElementById('next-btn').style.display = 'block';
        }

        // تشغيل أول سؤال عند فتح الصفحة
        window.onload = loadNextQuestion;
    </script>
</body>
</html>
