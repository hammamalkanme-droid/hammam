<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فريق النخبة | بوت زيد لمراحل الثانوية</title>
    <!-- استيراد خط "القاهرة" الاحترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* تنسيق الجزء العلوي (Header) */
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        /* تنسيق المحتوى الأوسط (Main) */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .question-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s ease;
            border-top: 5px solid var(--secondary-color);
        }

        .question-card:hover {
            transform: translateY(-5px);
        }

        .subject-title {
            color: var(--secondary-color);
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.6;
            min-height: 80px; /* للحفاظ على حجم البطاقة ثابتاً */
        }

        /* تنسيق الزر */
        .renew-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .renew-btn:hover {
            background-color: #2980b9;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .renew-btn:active {
            transform: scale(0.95);
        }

        /* تأثير التلاشي عند تغيير السؤال */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تنسيق الجزء السفلي (Footer) */
        footer {
            text-align: center;
            padding: 15px 0;
            background-color: var(--primary-color);
            color: white;
            font-size: 0.9rem;
        }

        footer span {
            color: var(--secondary-color);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <header>
        <h1>فريق النخبة | بوت زيد لمراحل الثانوية</h1>
    </header>

    <main>
        <div class="question-card" id="card">
            <div class="subject-title" id="subject">المادة: جاري التحميل...</div>
            <div class="question-text" id="question">يرجى الانتظار، يتم جلب السؤال...</div>
            <button class="renew-btn" onclick="generateQuestion()">
                تجديد سؤال 
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>
        </div>
    </main>

    <footer>
        <p>المطور <span>همَّام الكانمي</span> &copy; 2026</p>
    </footer>

    <script>
        // قاعدة بيانات مصغرة للأسئلة (يمكنك إضافة مئات الأسئلة هنا)
        const questionsDatabase = [
            { subject: "الفيزياء", text: "ما هو قانون نيوتن الثالث للحركة؟" },
            { subject: "الكيمياء", text: "ما هو العدد الذري للأكسجين؟" },
            { subject: "الرياضيات", text: "ما هي قيمة π (باي) التقريبية؟" },
            { subject: "التاريخ", text: "في أي عام حدثت معركة القرضابية الشهيرة؟" },
            { subject: "الجغرافيا", text: "ما هي أكبر قارة في العالم من حيث المساحة؟" },
            { subject: "الأحياء", text: "ما هو العضو المسؤول عن ضخ الدم في جسم الإنسان؟" },
            { subject: "اللغة العربية", text: "من هو الشاعر الملقب بأمير الشعراء؟" },
            { subject: "تقنية المعلومات", text: "ماذا يرمز اختصار HTML؟" }
        ];

        // دالة لاختيار سؤال عشوائي وعرضه
        function generateQuestion() {
            const subjectElement = document.getElementById("subject");
            const questionElement = document.getElementById("question");
            const cardElement = document.getElementById("card");

            // إزالة فئة الحركة لإعادة تشغيلها
            subjectElement.classList.remove("fade-in");
            questionElement.classList.remove("fade-in");

            // اختيار سؤال عشوائي
            const randomIndex = Math.floor(Math.random() * questionsDatabase.length);
            const selectedQuestion = questionsDatabase[randomIndex];

            // خدعة صغيرة لإعادة تشغيل الـ Animation
            void subjectElement.offsetWidth; 

            // تحديث النصوص
            subjectElement.innerText = "المادة: " + selectedQuestion.subject;
            questionElement.innerText = selectedQuestion.text;

            // إضافة فئة الحركة مجدداً
            subjectElement.classList.add("fade-in");
            questionElement.classList.add("fade-in");
        }

        // عرض سؤال أول بمجرد فتح الصفحة
        window.onload = generateQuestion;
    </script>

</body>
</html>
