<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فريق النخبة | بوت زيد لمراحل الثانوية</title>
    <!-- استيراد خط القاهرة الاحترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1e3c72;
            --secondary-color: #2a5298;
            --accent-color: #00c6ff;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #6c757d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* الهيدر العلوي */
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        /* منطقة المحتوى الأوسط */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        /* كرت السؤال */
        .question-card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            border-top: 6px solid var(--accent-color);
            transition: transform 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-5px);
        }

        .subject-badge {
            display: inline-block;
            background-color: rgba(0, 198, 255, 0.1);
            color: var(--secondary-color);
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 600;
            line-height: 1.7;
            margin-bottom: 35px;
            min-height: 90px; /* للحفاظ على ثبات ارتفاع الكرت */
        }

        /* زر التجديد */
        .renew-btn {
            background: linear-gradient(135deg, var(--accent-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 198, 255, 0.3);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .renew-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0, 198, 255, 0.4);
        }

        .renew-btn:active {
            transform: scale(0.98);
        }

        /* تأثير الأنيميشن عند تغيير السؤال */
        .fade-in {
            animation: fadeInEffect 0.4s ease-out forwards;
        }

        @keyframes fadeInEffect {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* الفوتر السفلي */
        footer {
            background-color: var(--primary-color);
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            padding: 18px 15px;
            font-size: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer strong {
            color: var(--accent-color);
            font-weight: 800;
        }
    </style>
</head>
<body>

    <!-- الجزء العلوي -->
    <header>
        <h1>فريق النخبة | بوت زيد لمراحل الثانوية</h1>
    </header>

    <!-- المنتصف -->
    <main>
        <div class="container">
            <div class="question-card">
                <div class="subject-badge" id="subject-display">المادة: ...</div>
                <div class="question-text" id="question-display">جاري تجهيز السؤال الأول...</div>
                
                <button class="renew-btn" onclick="nextQuestion()">
                    <span>تجديد سؤال</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <!-- الجزء السفلي -->
    <footer>
        <p>المطور: <strong>همَّام الكانمي</strong> &copy; 2026</p>
    </footer>

    <script>
        // مصفوفة الأسئلة - يمكنك التعديل عليها وزيادتها بحريّة
        const questionsList = [
            { subject: "الفيزياء", question: "ما هو المبدأ الفيزيائي الذي تعتمد عليه حركة الصواريخ في الفضاء؟" },
            { subject: "الكيمياء", question: "ماذا يحدث لدرجة الغليان عند زيادة الضغط الواقع على السائل؟" },
            { subject: "الرياضيات", question: "إذا كانت د(س) = س² + 5، فما هي قيمة المشتقة الأولى د'(س)؟" },
            { subject: "اللغة العربية", question: "ما هو حكم المبتدأ والخبر من حيث الإعراب في الجملة الاسمية؟" },
            { subject: "الأحياء", question: "ما هو العُضي الخلوي المسؤول عن إنتاج الطاقة (ATP) في الخلية؟" },
            { subject: "تقنية المعلومات", question: "ما الفرق الأساسي بين الذاكرة العشوائية RAM والذاكرة الدائمة ROM؟" },
            { subject: "الجغرافيا", question: "ما هي الظاهرة الطبيعية المسؤولة عن تشكّل الكثبان الرملية في الصحراء؟" }
        ];

        let lastIndex = -1;

        function nextQuestion() {
            const subjectEl = document.getElementById('subject-display');
            const questionEl = document.getElementById('question-display');
            
            // إزالة تأثير الحركة لإعادة تشغيله من جديد
            subjectEl.classList.remove('fade-in');
            questionEl.classList.remove('fade-in');
            
            // اختيار عشوائي ذكي يمنع تكرار نفس السؤال مرتين متتاليتين
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * questionsList.length);
            } while (randomIndex === lastIndex && questionsList.length > 1);
            
            lastIndex = randomIndex;
            const currentItem = questionsList[randomIndex];
            
            // إجبار المتصفح على إعادة حساب الأبعاد لتفعيل الأنيميشن مجدداً
            void subjectEl.offsetWidth;
            
            // تحديث البيانات في الواجهة
            subjectEl.textContent = `المادة: ${currentItem.subject}`;
            questionEl.textContent = currentItem.question;
            
            // إضافة تأثير الحركة
            subjectEl.classList.add('fade-in');
            questionEl.classList.add('fade-in');
        }

        // تشغيل أول سؤال تلقائياً عند فتح الصفحة
        window.onload = nextQuestion;
    </script>

</body>
</html>
