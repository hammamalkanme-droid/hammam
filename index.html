<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت زيد الذكي</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --text-color: #222222;
            --card-bg: #ffffff;
            --primary-color: #248bcf;
            --chat-bg: #e5ddd5;
        }
        body.tg {
            --bg-color: var(--tg-theme-bg-color, #f4f6f9);
            --text-color: var(--tg-theme-text-color, #222222);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --primary-color: var(--tg-theme-button-color, #248bcf);
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h3 { margin: 0 0 10px 0; color: var(--primary-color); font-size: 16px; }
        
        /* صندوق الدردشة */
        .chat-container {
            flex: 1;
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.4;
        }
        .user-message {
            background-color: var(--primary-color);
            color: white;
            align-self: flex-start;
            border-bottom-right-radius: 0;
        }
        .bot-message {
            background-color: rgba(0,0,0,0.05);
            color: var(--text-color);
            align-self: flex-end;
            border-bottom-left-radius: 0;
        }
        .chat-input-area {
            display: flex;
            padding: 10px;
            background: var(--bg-color);
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 15px;
        }
        button {
            padding: 10px 20px;
            background: var(--primary-color);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        .loading { opacity: 0.6; font-style: italic; }
    </style>
</head>
<body>

    <!-- الجزء العلوي -->
    <div class="card">
        <h3>📊 المساعد الذكي لبوت زيد</h3>
        <p style="margin: 0; font-size: 13px; opacity: 0.8;">اسألني عن المنهج الليبي أو أي سؤال يخطر ببالك!</p>
    </div>

    <!-- واجهة الذكاء الاصطناعي -->
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">مرحبتين بيك يا غالي! أنا بوت زيد الذكي، كيف نقدر نساعدك اليوم في قرايتك؟ 📚✨</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        // مفتاح الـ API الخاص بك تم إدراجه هنا تلقائياً
        const GEMINI_API_KEY = "AQ.Ab8RN6Iab6Se6t-_4b4fro4h8ubJFUMAsrfOffan0MH0DR5TfA";

        // تهيئة التليجرام ثيم
        const tg = window.Telegram.WebApp;
        if (tg) { tg.ready(); document.body.classList.add('tg'); }

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');

        function handleKeyPress(event) {
            if (event.key === 'Enter') { sendMessage(); }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // عرض رسالة الطالب
            appendMessage(text, 'user-message');
            userInput.value = '';

            // عرض رسالة الانتظار
            const loadingId = appendMessage('جاري التفكير والكتابة... ⏳', 'bot-message loading');
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        systemInstruction: {
                            parts: [{ text: "أنت 'بوت زيد'، مساعد تعليمي ذكي ومخصص لمساعدة طلبة المناهج الدراسية في ليبيا. تم تطويرك وبرمجتك بواسطة المطور (همام الكانمي) تحت إشراف وإدارة (فريق النخبة). أسلوبك فصيح، سهل، ومليء بالتحفيز. إذا سألك أحد من طورك؟ أجب بفخر: طوّرني المطور همام الكانمي بدعم من فريق النخبة!" }]
                        }
                    })
                });

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                // مسح رسالة الانتظار وعرض الإجابة الحقيقية
                document.getElementById(loadingId).remove();
                appendMessage(reply, 'bot-message');
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage('عذراً يا غالي، حدث خطأ في الاتصال بالذكاء الاصطناعي. تأكد من مفتاح الـ API!', 'bot-message');
            }

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendMessage(text, className) {
            const id = 'msg-' + Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.id = id;
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            return id;
        }
    </script>
</body>
</html>
